<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Счёт № {{ invoice_id }}</title>
    <style>
        /* Подключаем шрифт с поддержкой кириллицы */
        @font-face {
            font-family: 'DejaVu Sans';
            src: local('DejaVu Sans'), local('Arial'), local('Roboto');
        }
        
        body { 
            font-family: 'DejaVu Sans', 'Arial', sans-serif; 
            padding: 40px; 
            line-height: 1.5;
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }
        
        .invoice-title { 
            font-size: 24px; 
            font-weight: bold; 
            margin: 0;
        }
        
        .meta { 
            display: flex; 
            justify-content: space-between; 
            margin: 20px 0; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 20px 0; 
        }
        
        th, td { 
            border: 1px solid #333; 
            padding: 12px; 
            text-align: center; 
        }
        
        th { 
            background-color: #f0f0f0; 
            font-weight: bold;
        }
        
        /* Чтобы длинные названия товаров переносились */
        td {
            word-wrap: break-word;
            max-width: 200px;
        }
        
        .total { 
            text-align: right; 
            font-size: 18px; 
            font-weight: bold; 
            margin-top: 20px;
            border-top: 2px solid #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="invoice-title">СЧЁТ № {{ invoice_id }}</div>
        <div>Дата: {{ date }}</div>
    </div>
    
    <div class="meta">
        <div><strong>Покупатель:</strong> {{ customer_name }}</div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>Товар</th>
                <th>Цена (₽)</th>
                <th>Кол-во</th>
                <th>Сумма (₽)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ product }}</td>
                <td>{{ price }}</td>
                <td>{{ qty }}</td>
                <td>{{ total }}</td>
            </tr>
        </tbody>
    </table>
    
    <div class="total">Итого: {{ total }} ₽</div>
</body>
</html>
